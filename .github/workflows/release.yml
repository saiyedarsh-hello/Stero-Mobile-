name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write # Required for electron-builder to create a GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React and Electron
        run: npm run build

      - name: Build Executable and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
